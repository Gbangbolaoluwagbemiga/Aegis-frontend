name: Aegis Frontend Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    name: Frontend PR Audit
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Review Dashboard Build
        id: build_review
        continue-on-error: true
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build

      - name: ❌ Handle Review Failure
        if: steps.build_review.outcome == 'failure'
        run: |
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          gh pr comment ${{ github.event.pull_request.number }} --body "hey, took a look at the PR for '$PR_TITLE'. actually, it looks like the build is failing right now. mind checking the logs and fixing the errors? once it's passing, just push an update and we can get it merged."
          exit 1

      - name: ✅ Handle Review Success
        if: steps.build_review.outcome == 'success'
        run: |
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          gh pr comment ${{ github.event.pull_request.number }} --body "hey, just went through the changes for '$PR_TITLE'. looks really solid and the builds are passing perfectly. going ahead and merging this into main now, thanks for the contribution!"
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto
